version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parttime-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_PATH=/app/data/parttime.db
    volumes:
      - ./data:/app/data
    networks:
      - parttime-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parttime-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - parttime-network

networks:
  parttime-network:
    driver: bridge

volumes:
  data:
